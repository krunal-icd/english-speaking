        * {

        }

        }

        }

        }

        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .search-box {
            margin-bottom: 30px;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: box-shadow 0.3s;
        }

        .search-box input:focus {
            outline: none;
            box-shadow: 0 8px 12px rgba(0,0,0,0.2);
        }

        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .vocab-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: default;
        }

        .vocab-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.15);
        }

        .vocab-card.hidden {
            display: none;
        }

        .english {
            font-size: 1.3em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .hindi {
            font-size: 1.2em;
            color: #764ba2;
            font-family: 'Noto Sans Devanagari', 'Arial Unicode MS', sans-serif;
        }

        .stats {
            text-align: center;
            color: white;
            font-size: 1em;
            margin-top: 20px;
        }

        .category-label {
            font-size: 0.75em;
            background: #f0f0f0;
            color: #666;
            padding: 5px 10px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 10px;
        }
    </style>

        // Render vocabulary cards
        function renderVocab(data) {
            const container = document.getElementById('vocabContainer');
            container.innerHTML = '';
            
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'vocab-card';
                card.innerHTML = `
                    <div class="english">${item.en}</div>
                    <div class="hindi">${item.hi}</div>
                `;
                container.appendChild(card);
            });

            document.getElementById('total').textContent = vocabulary.length;
            document.getElementById('shown').textContent = data.length;
        }

        // Filter vocabulary
        function filterVocab() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            if (searchTerm === '') {
                renderVocab(vocabulary);
                return;
            }

            const filtered = vocabulary.filter(item =>
                item.en.toLowerCase().includes(searchTerm) || 
                item.hi.toLowerCase().includes(searchTerm)
            );

            renderVocab(filtered);
        }

        // Initial render
        renderVocab(vocabulary);
    </script>
